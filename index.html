<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Assignment Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase (Compat versions for easier browser support) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        i[data-lucide] { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * NOTE FOR GITHUB: These keys are for a client-side Firebase project 
         * with public security rules enforced via Firestore. 
         * This is intended for public deployment.
         */
        const firebaseConfig = {
            apiKey: "AIzaSyAs-ExampleKeyReplaceWithActual", 
            authDomain: "canvas-artifacts.firebaseapp.com",
            projectId: "canvas-artifacts",
            storageBucket: "canvas-artifacts.firebasestorage.app",
            messagingSenderId: "1035543717208",
            appId: "1:1035543717208:web:7f66a87c1817c803328e46"
        };

        const CUSTOM_APP_ID = "bdelapaz-tracker-v2";
        const SUBJECTS = ["Math", "English / ELA", "Science", "Social Studies", "Elective / PE"];
        const TEACHER_PASSWORD = "teacher123";

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.lucide && iconRef.current) {
                        window.lucide.createIcons({
                            attrs: { strokeWidth: 2, class: className },
                            nameAttr: 'data-lucide'
                        });
                    }
                }, 50);
                return () => clearTimeout(timer);
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('student');
            const [teacherAuth, setTeacherAuth] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [studentName, setStudentName] = useState(localStorage.getItem('student_display_name') || '');
            const [assignments, setAssignments] = useState([]);
            const [allStudentsData, setAllStudentsData] = useState({});
            const [taskName, setTaskName] = useState('');
            const [taskSubject, setTaskSubject] = useState('');
            const [taskDate, setTaskDate] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const login = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (e) {
                        console.error("Auth error:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                login();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || view !== 'student') return;
                const path = `artifacts/${CUSTOM_APP_ID}/public/data/assignments`;
                const unsubscribe = db.collection(path)
                    .where('userId', '==', user.uid)
                    .onSnapshot(snapshot => {
                        const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setAssignments(docs);
                    });
                return () => unsubscribe();
            }, [user, view]);

            useEffect(() => {
                if (!user || !teacherAuth || view !== 'teacher') return;
                const path = `artifacts/${CUSTOM_APP_ID}/public/data/assignments`;
                const unsubscribe = db.collection(path)
                    .onSnapshot(snapshot => {
                        const grouped = {};
                        snapshot.docs.forEach(d => {
                            const data = d.data();
                            if (!grouped[data.userId]) {
                                grouped[data.userId] = { name: data.userName || 'Unnamed Student', tasks: [] };
                            }
                            grouped[data.userId].tasks.push({ id: d.id, ...data });
                        });
                        setAllStudentsData(grouped);
                    });
                return () => unsubscribe();
            }, [user, teacherAuth, view]);

            const addAssignment = async (e) => {
                e.preventDefault();
                if (!taskName || !taskSubject || !studentName || !user) return;
                localStorage.setItem('student_display_name', studentName);
                const path = `artifacts/${CUSTOM_APP_ID}/public/data/assignments`;
                await db.collection(path).add({
                    userId: user.uid,
                    userName: studentName,
                    name: taskName,
                    subject: taskSubject,
                    dueDate: taskDate,
                    status: 'Missing',
                    timestamp: Date.now()
                });
                setTaskName(''); 
                setTaskDate('');
            };

            const toggleStatus = async (item) => {
                const path = `artifacts/${CUSTOM_APP_ID}/public/data/assignments/${item.id}`;
                await db.doc(path).update({
                    status: item.status === 'Missing' ? 'Turned In' : 'Missing'
                });
            };

            const deleteItem = async (id) => {
                if (window.confirm("Delete this assignment?")) {
                    const path = `artifacts/${CUSTOM_APP_ID}/public/data/assignments/${id}`;
                    await db.doc(path).delete();
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 pb-12">
                    <nav className="bg-white border-b border-slate-200 px-4 md:px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <Icon name="check-circle" size={20} />
                            </div>
                            <span className="font-bold text-lg text-slate-800">ClassTracker</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('student')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${view === 'student' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Student</button>
                            <button onClick={() => setView('teacher')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${view === 'teacher' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Teacher</button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-4 md:p-6 mt-4">
                        {view === 'student' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-bold text-slate-700 mb-4 text-xs uppercase tracking-widest flex items-center gap-2"><Icon name="user" size={14}/> Student Profile</h3>
                                        <input type="text" placeholder="Your Full Name" value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" />
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-bold text-slate-700 mb-4 text-xs uppercase tracking-widest flex items-center gap-2"><Icon name="plus" size={14}/> Add Task</h3>
                                        <form onSubmit={addAssignment} className="space-y-4">
                                            <input type="text" placeholder="Assignment Name" value={taskName} onChange={e => setTaskName(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" />
                                            <select value={taskSubject} onChange={e => setTaskSubject(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                                                <option value="">Choose Class...</option>
                                                {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                            <input type="date" value={taskDate} onChange={e => setTaskDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" />
                                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg active:scale-95 transition-all">Add to List</button>
                                        </form>
                                    </div>
                                </div>
                                <div className="lg:col-span-2 space-y-4">
                                    <h2 className="text-xl font-bold text-slate-800">My Missing Work</h2>
                                    {assignments.length === 0 ? (
                                        <div className="bg-white p-12 rounded-3xl border-2 border-dashed border-slate-200 text-center text-slate-400">No items found.</div>
                                    ) : (
                                        assignments.sort((a,b) => b.timestamp - a.timestamp).map(item => (
                                            <div key={item.id} className={`bg-white p-5 rounded-2xl border-l-4 shadow-sm flex items-center justify-between transition-all ${item.status === 'Turned In' ? 'border-emerald-500 opacity-60' : 'border-indigo-500'}`}>
                                                <div className="flex-1 min-w-0">
                                                    <span className="text-[10px] font-black uppercase bg-slate-100 text-slate-500 px-2 py-0.5 rounded mb-1 inline-block">{item.subject}</span>
                                                    <h3 className={`font-bold text-lg truncate ${item.status === 'Turned In' ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.name}</h3>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => toggleStatus(item)} className={`${item.status === 'Turned In' ? 'text-emerald-500' : 'text-slate-300'}`}><Icon name="check-circle" size={32} /></button>
                                                    <button onClick={() => deleteItem(item.id)} className="text-slate-200 hover:text-rose-500"><Icon name="trash-2" size={20} /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in max-w-2xl mx-auto">
                                {!teacherAuth ? (
                                    <div className="bg-white p-10 rounded-3xl border border-slate-200 shadow-xl text-center mt-12">
                                        <Icon name="lock" size={32} className="text-indigo-600 mx-auto mb-4" />
                                        <h2 className="text-2xl font-bold mb-6">Teacher Portal</h2>
                                        <input type="password" placeholder="Password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500" />
                                        <button onClick={() => passwordInput === TEACHER_PASSWORD ? setTeacherAuth(true) : alert("Incorrect Password")} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl active:scale-95 transition-all">Unlock Dashboard</button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="flex items-center justify-between">
                                            <h2 className="text-2xl font-bold">Class Overview</h2>
                                            <button onClick={() => setTeacherAuth(false)} className="text-slate-400 text-sm">Log Out</button>
                                        </div>
                                        {Object.entries(allStudentsData).map(([uid, data]) => (
                                            <div key={uid} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-6">
                                                <div className="p-5 bg-slate-50 border-b font-bold flex justify-between items-center">
                                                    <span>{data.name}</span>
                                                    <span className="text-rose-500 text-xs">{data.tasks.filter(t => t.status === 'Missing').length} Missing</span>
                                                </div>
                                                <div className="p-5 space-y-2">
                                                    {data.tasks.map(t => (
                                                        <div key={t.id} className="flex justify-between items-center text-sm p-2 bg-slate-50 rounded-lg">
                                                            <span>[{t.subject}] {t.name}</span>
                                                            <span className={t.status === 'Turned In' ? 'text-emerald-500 font-bold' : 'text-rose-500 font-bold'}>{t.status}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
