<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Assignment Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
body { margin: 0; font-family: Arial, sans-serif; background:#f8fafc;}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

function App() {
  const [name, setName] = React.useState("");
  const [task, setTask] = React.useState("");
  const [list, setList] = React.useState([]);

  function addTask() {
    if (!task || !name) return;
    setList([...list, { name, task, done:false }]);
    setTask("");
  }

  function toggle(index) {
    const newList = [...list];
    newList[index].done = !newList[index].done;
    setList(newList);
  }

  return e("div", { style:{padding:"20px", maxWidth:"600px", margin:"auto"} },
    
    e("h1", {style:{fontSize:"24px", fontWeight:"bold"}}, "ClassTracker"),

    e("input", {
      placeholder:"Your Name",
      value:name,
      onChange:(ev)=>setName(ev.target.value),
      style:{display:"block", margin:"10px 0", padding:"10px", width:"100%"}
    }),

    e("input", {
      placeholder:"Assignment",
      value:task,
      onChange:(ev)=>setTask(ev.target.value),
      style:{display:"block", margin:"10px 0", padding:"10px", width:"100%"}
    }),

    e("button", {
      onClick:addTask,
      style:{padding:"10px", background:"#4f46e5", color:"white", border:"none"}
    }, "Add"),

    e("div", {style:{marginTop:"20px"}},
      list.map((item, i) =>
        e("div", {
          key:i,
          onClick:()=>toggle(i),
          style:{
            padding:"10px",
            marginBottom:"8px",
            background:"white",
            cursor:"pointer",
            textDecoration: item.done ? "line-through":"none"
          }
        }, item.name + ": " + item.task)
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>

</body>
</html>
